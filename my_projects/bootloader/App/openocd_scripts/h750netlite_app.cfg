# App-local wrapper for debugging the AXI SRAM demo from the App workspace.
# The board/probe setup stays shared with the bootloader project.
set _APP_SCRIPT_DIR [file dirname [info script]]
add_script_search_dir $_APP_SCRIPT_DIR
add_script_search_dir [file normalize [file join $_APP_SCRIPT_DIR .. .. openocd_scripts]]

source [find h750netlite.cfg]
