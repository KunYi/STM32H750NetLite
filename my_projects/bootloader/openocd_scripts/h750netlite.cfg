# add_script_search_dir /usr/share/openocd/scripts
add_script_search_dir [file dirname [info script]]

source [find cmsis-dap.cfg]
transport select swd
source [find stm32h750.cfg]
reset_config srst_only srst_nogate
adapter speed 4000
$_CHIPNAME.cpu0 configure -event gdb-detach {
    resume
}

init
reset halt
sleep 100
